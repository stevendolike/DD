name: Cleanup Old Files

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Remove old files
        run: |
          git rm -rf --ignore-unmatch regions/
          git rm -rf --ignore-unmatch regions_443/
          git rm -f --ignore-unmatch split.py

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git diff --staged --quiet || git commit -m "Cleanup old files"
          git push
