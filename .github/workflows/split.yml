name: Split by Region

on:
  workflow_dispatch:
  schedule:
    - cron: '0 16 * * *'   # 00:00 HKT
    - cron: '0 22 * * *'   # 06:00 HKT
    - cron: '0 4 * * *'    # 12:00 HKT
    - cron: '0 10 * * *'   # 18:00 HKT

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  split:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all.json
        run: |
          curl -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" \
            -H "Accept: application/json, text/plain, */*" \
            -H "Accept-Language: zh-TW,zh;q=0.9,en;q=0.8" \
            -H "Referer: https://zip.cm.edu.kg/" \
            -o all.json "https://zip.cm.edu.kg/all.json"
          # 檢查是否真的是 JSON
          python3 -c "import json,sys; json.load(open('all.json'))" && echo "JSON OK" || echo "非 JSON，可能被攔截"

      - name: Split json by region + org
        run: python3 split_json.py

      - name: Update README
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python3 update_readme.py

      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          [ -d regions_json ] && git add regions_json/
          [ -d regions_json_443 ] && git add regions_json_443/
          git add README.md
          git diff --staged --quiet || git commit -m "Auto update $(date '+%Y-%m-%d %H:%M HKT')"
          git push
