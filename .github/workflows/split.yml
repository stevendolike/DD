name: Split by Region

on:
  workflow_dispatch:
  schedule:
    - cron: '0 16 * * *'   # 00:00 HKT
    - cron: '0 22 * * *'   # 06:00 HKT
    - cron: '0 4 * * *'    # 12:00 HKT
    - cron: '0 10 * * *'   # 18:00 HKT

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  split:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all.json
        run: |
          curl -A "Mozilla/5.0" -o all_new.json "https://proxy.999122.xyz/zip.cm.edu.kg/all.json"
          head -c 100 all_new.json

      - name: Validate and replace
        run: python3 validate.py

      - name: Split json by region + org
        run: python3 split_json.py

      - name: Update README
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python3 update_readme.py

      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          for dir in regions_json regions_json_*/; do
            [ -d "$dir" ] && git add "$dir"
          done
          git add README.md stats.json
          TOTAL=$(python3 -c "
import json
d = json.load(open('stats.json'))
total = 0
for dir_stats in d.values():
    for v in dir_stats.values():
        if isinstance(v, dict):
            total += sum(v.values())
        else:
            total += v
print(total)
")
          git diff --staged --quiet || git commit -m "Auto update $(date '+%Y-%m-%d %H:%M HKT') · ${TOTAL} entries"
          git push
